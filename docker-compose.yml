version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-dashboard-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - smart-dashboard-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-dashboard-frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - smart-dashboard-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

networks:
  smart-dashboard-network:
    driver: bridge
